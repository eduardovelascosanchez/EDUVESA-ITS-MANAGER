<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semáforo de Vigencias · Red de Training Sites AHA</title>
<style>
  :root{
    --purple-950:#241340; --purple-900:#2E1A52; --purple-800:#3B1F5E; --purple-600:#5A3D8A;
    --purple-100:#EDE8F6; --purple-50:#F7F5FB;
    --green:#3E8E4F; --green-soft:#E4F2E7;
    --amber:#C98A1B; --amber-soft:#FBF0DA;
    --red:#B84040; --red-soft:#F9E4E4;
    --ink:#241F2E; --ink-soft:#6B6478; --line:#E3DEEE; --card:#FFFFFF;
    --radius:14px;
    --font-display:"Trebuchet MS","Segoe UI",system-ui,sans-serif;
    --font-body:"Segoe UI",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--purple-50);color:var(--ink);min-height:100vh;display:flex}
  button{font-family:inherit;cursor:pointer}

  /* ---------- Sidebar ---------- */
  aside{width:240px;min-height:100vh;background:var(--purple-950);color:#fff;padding:26px 18px;position:sticky;top:0;flex-shrink:0;display:flex;flex-direction:column}
  .brand{display:flex;gap:10px;align-items:center;margin-bottom:8px}
  .brand-dot{width:38px;height:38px;border-radius:11px;background:var(--purple-800);display:grid;place-items:center;font-size:19px}
  .brand h1{font-family:var(--font-display);font-size:16px;line-height:1.15;letter-spacing:.2px}
  .brand small{display:block;font-size:10.5px;color:#B9ACD6;font-weight:400;margin-top:2px}
  nav{margin-top:26px;display:flex;flex-direction:column;gap:3px}
  nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;color:#CFC4E6;
    padding:10px 12px;border-radius:9px;font-size:13.5px;transition:background .15s,color .15s}
  nav button:hover{background:var(--purple-900);color:#fff}
  nav button.active{background:var(--purple-800);color:#fff;font-weight:600}
  nav button:focus-visible{outline:2px solid var(--green);outline-offset:2px}
  nav .n-ico{width:20px;text-align:center}
  .side-foot{margin-top:auto;padding-top:20px;font-size:10.5px;color:#8D7FB0;line-height:1.5}

  /* ---------- Main ---------- */
  main{flex:1;padding:30px 36px 60px;max-width:1200px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .topbar h2{font-family:var(--font-display);font-size:26px;color:var(--purple-800)}
  .topbar p{color:var(--ink-soft);font-size:13px;margin-top:4px;max-width:640px}
  .top-actions{display:flex;gap:8px;flex-wrap:wrap}

  .btn{border:0;border-radius:9px;padding:9px 15px;font-size:13px;font-weight:600;transition:filter .15s}
  .btn:hover{filter:brightness(1.08)}
  .btn:focus-visible{outline:2px solid var(--purple-600);outline-offset:2px}
  .btn-primary{background:var(--purple-800);color:#fff}
  .btn-green{background:var(--green);color:#fff}
  .btn-ghost{background:#fff;color:var(--purple-800);border:1px solid var(--line)}
  .btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
  .btn-danger-ghost{background:#fff;color:var(--red);border:1px solid var(--line)}

  /* ---------- Semáforo hero ---------- */
  .semaforo{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
  .sem-card{border-radius:var(--radius);padding:20px 22px;color:#fff;position:relative;overflow:hidden}
  .sem-card .big{font-family:var(--font-display);font-size:44px;font-weight:700;line-height:1}
  .sem-card .lbl{font-size:12.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;opacity:.92;margin-bottom:8px}
  .sem-card .sub{font-size:12px;opacity:.85;margin-top:6px}
  .sem-verde{background:linear-gradient(135deg,#3E8E4F,#2F7040)}
  .sem-amarillo{background:linear-gradient(135deg,#C98A1B,#A66F0F)}
  .sem-rojo{background:linear-gradient(135deg,#B84040,#953030)}
  .sem-card::after{content:"";position:absolute;right:-30px;top:-30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.10)}

  /* ---------- Cards, tables ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:18px}
  .card h3{font-family:var(--font-display);font-size:15.5px;color:var(--purple-800);margin-bottom:14px}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  select,input[type=text],input[type=date],input[type=number],textarea{
    font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  select:focus,input:focus,textarea:focus{outline:2px solid var(--purple-600);outline-offset:1px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:var(--purple-100);color:var(--purple-800);text-align:left;padding:9px 12px;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px}
  th:first-child{border-radius:8px 0 0 8px} th:last-child{border-radius:0 8px 8px 0}
  td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;font-size:11.5px;font-weight:700}
  .chip::before{content:"";width:8px;height:8px;border-radius:50%}
  .chip-verde{background:var(--green-soft);color:var(--green)} .chip-verde::before{background:var(--green)}
  .chip-amarillo{background:var(--amber-soft);color:var(--amber)} .chip-amarillo::before{background:var(--amber)}
  .chip-rojo{background:var(--red-soft);color:var(--red)} .chip-rojo::before{background:var(--red)}
  .chip-neutral{background:var(--purple-100);color:var(--purple-600)}
  .muted{color:var(--ink-soft);font-size:12px}
  code{background:var(--purple-50);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:11.5px}
  .empty{padding:34px;text-align:center;color:var(--ink-soft);font-size:13.5px;line-height:1.6}

  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .site-card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .site-card h4{font-family:var(--font-display);font-size:14.5px;color:var(--purple-800);margin-bottom:4px}
  .site-card .mini{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

  form.inline{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;align-items:end;margin-bottom:6px}
  form.inline label{display:flex;flex-direction:column;gap:4px;font-size:11.5px;font-weight:600;color:var(--ink-soft)}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(36,19,64,.55);display:none;place-items:center;z-index:50;padding:20px}
  .modal-bg.open{display:grid}
  .modal{background:#fff;border-radius:var(--radius);max-width:640px;width:100%;padding:24px;max-height:88vh;overflow:auto}
  .modal h3{font-family:var(--font-display);color:var(--purple-800);font-size:17px;margin-bottom:12px}
  .modal textarea{width:100%;min-height:220px;line-height:1.55;font-size:13px}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

  .note{background:var(--purple-100);border-radius:10px;padding:12px 14px;font-size:12.5px;color:var(--purple-800);line-height:1.55;margin-bottom:16px}
  .warn{background:var(--amber-soft);color:#8A5D0E}
  .report-box{white-space:pre-wrap;font-size:13px;line-height:1.6;background:var(--purple-50);border:1px solid var(--line);border-radius:10px;padding:16px}

  .toast{position:fixed;bottom:22px;right:22px;background:var(--purple-950);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;
    opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;z-index:99}
  .toast.show{opacity:1;transform:none}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  .only-print{display:none}
  @media print{
    @page{ margin:14mm; size:A4 landscape; }
    aside, #btnPrint, .top-actions, nav, .filters input[type=checkbox], .modal-bg, .toast{ display:none!important; }
    body{ display:block!important; background:#fff!important; }
    main{ max-width:100%!important; padding:0!important; }
    .only-print{ display:block!important; }
    .topbar .top-actions{ display:none!important; }
    .card{ break-inside:avoid; box-shadow:none!important; border:1px solid #ccc!important; }
    .sem-card{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .chip{ -webkit-print-color-adjust:exact; print-color-adjust:exact; border:1px solid #ddd; }
    table{ font-size:11px!important; }
    th{ -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    button:not(#btnPrint){ display:none!important; }
    tr{ break-inside:avoid; }
    h2{ font-size:20px!important; }
    a{ color:#000!important; text-decoration:none!important; }
  }
  @media (max-width:880px){
    body{flex-direction:column}
    aside{width:100%;min-height:0;position:static;padding:16px}
    nav{flex-direction:row;overflow-x:auto;margin-top:12px}
    nav button{white-space:nowrap}
    .side-foot{display:none}
    main{padding:20px 16px 50px}
    .semaforo{grid-template-columns:1fr}
    .grid-2{grid-template-columns:1fr}
  }
</style>
</head>

let db = load();
function load(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return JSON.parse(JSON.stringify(INITIAL_DATA)); // base real de la red (importada de los Excel de coordinación)
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(db)); }catch(e){ toast('No se pudo guardar en este navegador'); } }
function uid(){ return Math.random().toString(36).slice(2,9); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtFecha(iso){ if(!iso) return '—'; const d=new Date(iso+'T12:00:00'); return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}); }
function diasPara(iso){ if(!iso) return null; const d=new Date(iso+'T12:00:00'); return Math.floor((d-HOY())/(1000*60*60*24)); }
function estado(iso){ if(!iso) return 'sindato'; const d=diasPara(iso); return d<0 ? 'rojo' : d<=90 ? 'amarillo' : 'verde'; }
function chip(est,extra){ const t={verde:'Vigente',amarillo:'Por vencer',rojo:'Vencida',sindato:'Sin fecha en fuente'}[est]; const cls=est==='sindato'?'neutral':est; return `<span class="chip chip-${cls}">${t}${extra??''}</span>`; }
function norm2(s){ return String(s||'').trim().toUpperCase(); }
function siteEnBaja(id){ const s=db.sites.find(x=>x.id===id); return !!(s&&s.baja); }
function sitesActivos(){ return db.sites.filter(s=>!s.baja); }
function siteName(id){ return (db.sites.find(s=>s.id===id)||{}).nombre || '—'; }
function siteTS(id){ return (db.sites.find(s=>s.id===id)||{}).ts || ''; }
function siteFull(id){ const s=db.sites.find(x=>x.id===id); if(!s) return '—'; return esc(s.nombre)+(s.ts?` <span class="chip chip-neutral" title="Número de Training Site">TS ${esc(s.ts)}</span>`:''); }

/* Cada credencial de instructor: {disciplina, vence:'YYYY-MM-DD', verificado:false} */
function credenciales(){ // filas planas instructor×credencial (solo instructores activos)
  const rows=[];
  db.instructores.filter(i=>!i.baja && !siteEnBaja(i.site)).forEach(i => (i.credenciales||[]).forEach(c => rows.push({inst:i, cred:c})));
  return rows;
}

function logCambio(tipo, entidad, campo, anterior, nuevo){

function imprimirVista(){
  const fecha = HOY().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
  let head = document.getElementById('printHeader');
  if(!head){ head=document.createElement('div'); head.id='printHeader'; document.getElementById('main').prepend(head); }
  else { document.getElementById('main').prepend(head); }
  head.innerHTML = `<div style="display:none" class="only-print">
    <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #3B1F5E;padding-bottom:10px;margin-bottom:16px">

    </div></div>`;
  window.print();
}

calendario(){
  const hoy = HOY();
  const meses = [];
  for(let m=0;m<12;m++){
    const d = new Date(hoy.getFullYear(), hoy.getMonth()+m, 1);
    meses.push({year:d.getFullYear(), month:d.getMonth(), label:d.toLocaleDateString('es-MX',{month:'long',year:'numeric'})});
  }
  const creds = credenciales();
  const mapa = {};
  creds.forEach(r=>{
    if(!r.cred.vence) return;
    const d = new Date(r.cred.vence+'T12:00:00');
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if(!mapa[key]) mapa[key]={rojo:0,amarillo:0,verde:0};
    mapa[key][estado(r.cred.vence)]++;
  });
  const cells = meses.map(m=>{
    const key = `${m.year}-${m.month}`;
    const d = mapa[key]||{rojo:0,amarillo:0,verde:0};
    const total = d.rojo+d.amarillo+d.verde;
    const color = d.rojo>0?'var(--red-soft)':d.amarillo>0?'var(--amber-soft)':total>0?'var(--green-soft)':'var(--purple-50)';
    const borde = d.rojo>0?'2px solid var(--red)':d.amarillo>0?'2px solid var(--amber)':total>0?'2px solid var(--green)':'1px solid var(--line)';
    return `<div style="border-radius:12px;padding:16px;background:${color};border:${borde};min-width:150px">
      <div style="font-weight:700;font-size:14px;color:var(--purple-800);margin-bottom:8px;text-transform:capitalize">${esc(m.label)}</div>
      ${total===0?'<div class="muted">Sin vencimientos</div>':''}
      ${d.rojo?`<div style="color:var(--red);font-size:13px">🔴 ${d.rojo} vencidas</div>`:''}
      ${d.amarillo?`<div style="color:var(--amber);font-size:13px">🟡 ${d.amarillo} por vencer</div>`:''}
      ${d.verde?`<div style="color:var(--green);font-size:13px">🟢 ${d.verde} vigentes</div>`:''}
    </div>`;
  });
  const masUrgentes = creds.filter(r=>estado(r.cred.vence)==='amarillo').sort((a,b)=>diasPara(a.cred.vence)-diasPara(b.cred.vence)).slice(0,8);
  const tablaUrgentes = masUrgentes.length ? `<table><thead><tr><th>Instructor</th><th>Site</th><th>Disciplina</th><th>Vence en</th></tr></thead>
    <tbody>${masUrgentes.map(r=>`<tr><td>${esc(r.inst.nombre)}</td><td>${esc(siteName(r.inst.site))}</td>
      <td><span class="chip chip-neutral">${r.cred.disciplina}</span></td>
      <td><strong style="color:var(--amber)">${diasPara(r.cred.vence)} días</strong> · ${fmtFecha(r.cred.vence)}</td></tr>`).join('')}</tbody></table>`
    : '<div class="empty">Sin renovaciones urgentes en el horizonte.</div>';
  return `
  <div class="topbar"><div><h2>Calendario de vencimientos</h2><p>Próximos 12 meses.</p></div></div>
  <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:22px">${cells.join('')}</div>
  <div class="card"><h3>🟡 Renovaciones más urgentes (próximos 90 días)</h3>${tablaUrgentes}</div>`;
},

/* ---------- 3 · CURSOS ---------- */
cursos(){
  // detectar cursos futuros con instructor en baja o credencial vencida/ausente en esa disciplina
  function alertaCurso(cu){
    if(!cu.instructorId) return null;
    const inst = db.instructores.find(i=>i.id===cu.instructorId);
    if(!inst) return {tipo:'rojo', msg:'Instructor eliminado del registro'};
    if(inst.baja) return {tipo:'rojo', msg:`Instructor en baja (${fmtFecha(inst.baja.fecha)})`};
    if(siteEnBaja(inst.site)) return {tipo:'amarillo', msg:'El site del instructor está en baja'};
    const cred = (inst.credenciales||[]).find(c=>normTxt(c.disciplina)===normTxt(cu.disciplina));
    if(!cred) return {tipo:'rojo', msg:`Sin credencial ${cu.disciplina} registrada`};
    const est = estado(cred.vence);
    if(est==='rojo') return {tipo:'rojo', msg:`Credencial ${cu.disciplina} vencida (${fmtFecha(cred.vence)})`};
    if(est==='amarillo') return {tipo:'amarillo', msg:`Credencial vence pronto (${fmtFecha(cred.vence)})`};
    if(est==='sindato') return {tipo:'amarillo', msg:'Sin fecha de vencimiento en la base'};
    return null;
  }
  const rows = [...db.cursos].sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tabla = rows.length ? `<table>
    <thead><tr><th>Fecha</th><th>Disciplina</th><th>Site</th><th>Instructor</th><th>Participantes</th><th>Estado instructor</th><th></th></tr></thead>
    <tbody>${rows.map(cu=>{
      const esFuturo = diasPara(cu.fecha)>=0;
      const alerta = esFuturo ? alertaCurso(cu) : null;
      return `<tr${alerta&&alerta.tipo==='rojo'?' style="background:var(--red-soft)"':alerta&&alerta.tipo==='amarillo'?' style="background:var(--amber-soft)"':''}>
      <td>${fmtFecha(cu.fecha)} ${esFuturo?'<span class="chip chip-neutral">próximo</span>':''}</td>
      <td><span class="chip chip-neutral">${cu.disciplina}</span></td>
      <td>${esc(siteName(cu.site))}</td>
      <td>${esc(cu.instructor)}<br>${alerta?`<span style="font-size:11px;color:${alerta.tipo==='rojo'?'var(--red)':'var(--amber)'}">${esc(alerta.msg)}</span>`:''}</td>
      <td>${cu.participantes||'—'}</td>
      <td>${alerta?chip(alerta.tipo==='rojo'?'rojo':'amarillo'):'<span class="chip chip-verde">OK</span>'}</td>
      <td><button class="btn btn-danger-ghost btn-sm" onclick="delCurso('${cu.id}')">Eliminar</button></td></tr>`;
    }).join('')}</tbody></table>`
    : `<div class="empty">Sin cursos registrados.</div>`;
  return `
  <div class="topbar"><div><h2>Cursos</h2><p>Registro de cursos impartidos y programados en la red.</p></div></div>
  <div class="card"><h3>Registrar curso</h3>
    <form class="inline" onsubmit="return addCurso(event)">
      <label>Fecha<input type="date" id="c_fecha" required></label>
      <label>Disciplina<select id="c_disc">${DISCIPLINAS.map(d=>`<option>${d}</option>`).join('')}</select></label>

cuotas(){

/* ---------- 6 · RECORDATORIOS ---------- */
recordatorios(){
  const rows = credenciales().filter(r=>['amarillo','rojo'].includes(estado(r.cred.vence))).sort((a,b)=>diasPara(a.cred.vence)-diasPara(b.cred.vence));
  const tabla = rows.length ? `<table>

      const est=estado(r.cred.vence);
      return `<tr><td><strong>${esc(r.inst.nombre)}</strong></td><td>${esc(siteName(r.inst.site))}</td>

/* ---------- 7 · REPORTES ---------- */
reportes(){
  const rows = credenciales();
  const c={verde:0,amarillo:0,rojo:0,sindato:0}; rows.forEach(r=>c[estado(r.cred.vence)]++);
  const porSite = sitesActivos().map(s=>{
    const cr = rows.filter(r=>r.inst.site===s.id);
    return {n:s.nombre+(s.ts?' (TS '+s.ts+')':''), total:cr.length, rojo:cr.filter(r=>estado(r.cred.vence)==='rojo').length, amar:cr.filter(r=>estado(r.cred.vence)==='amarillo').length};
  });
  const rojosNoVerif = rows.filter(r=>estado(r.cred.vence)==='rojo' && !r.cred.verificado).length;
  const fecha = HOY().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
  const reporte =
`REPORTE EJECUTIVO · SEMÁFORO DE VIGENCIAS
Fecha del ciclo: ${fecha}
Red: ${sitesActivos().length} Training Sites activos (${db.sites.filter(s=>s.baja).length} en baja) · ${db.instructores.filter(i=>!i.baja&&!siteEnBaja(i.site)).length} instructores activos (${db.instructores.filter(i=>i.baja).length} en baja individual) · ${rows.length} credenciales activas

SEMÁFORO GLOBAL
  🟢 Vigentes: ${c.verde}
  🟡 Por vencer (≤90 días): ${c.amarillo}
  🔴 Vencidas: ${c.rojo}
  ⚪ Sin fecha en fuente: ${c.sindato} (excluidas del semáforo; resolver contra archivos de origen)

POR TRAINING SITE
${porSite.map(s=>`  · ${s.n}: ${s.total} credenciales — ${s.rojo} vencidas, ${s.amar} por vencer`).join('\n') || '  (sin sites)'}

ACCIONES PRIORITARIAS
  1. Cotejar contra AHA Instructor Network los ${c.rojo} casos vencidos (${rojosNoVerif} aún sin cotejo).
  2. Emitir recordatorios de renovación para los ${c.amarillo} casos por vencer.
  3. Programar cursos de actualización según demanda por disciplina.

CONTROL DE CALIDAD DEL CICLO
  · Conteo cuadrado: verde + amarillo + rojo + sin fecha = ${c.verde+c.amarillo+c.rojo+c.sindato} = total de credenciales (${rows.length}) ${c.verde+c.amarillo+c.rojo+c.sindato===rows.length?'✔':'✘ REVISAR'}
  · Verificación humana pendiente en casos rojos: ${rojosNoVerif}

Nota: reporte generado por la herramienta administrativa del workflow.
Ningún dato de paciente (PHI) forma parte de esta base.
Las decisiones y comunicaciones derivadas requieren revisión y firma de la coordinación.`;

  return `
  <div class="topbar"><div><h2>Reportes y respaldo</h2><p>Reporte ejecutivo del ciclo, exportación de datos y respaldo/restauración de la base.</p></div>
    <div class="top-actions">
      <button class="btn btn-primary" onclick="actualizarDesdeSheets()">🔄 Actualizar desde Google Sheets</button>
      <button class="btn btn-green" onclick="copiarReporte()">Copiar reporte</button>
      <button class="btn btn-ghost" onclick="verReporteSemestral()">📊 Reporte semestral</button>
      <button class="btn btn-ghost" onclick="exportCSV()">Exportar CSV</button>
      <button class="btn btn-ghost" onclick="exportJSON()">Respaldo JSON</button>
      <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">Restaurar respaldo</button>
      <button class="btn btn-ghost" onclick="resetBase()">Restablecer base de la red</button>
      <button class="btn btn-ghost" onclick="verScriptApps()">⚡ Apps Script (auto-recordatorios)</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>
  <div class="note">El respaldo JSON responde a la limitación conocida de localStorage: exporta la base completa cada semana y guárdala en tu Drive. Restaurarla toma un clic.</div>
  <div class="card"><h3>Reporte ejecutivo del ciclo</h3><div class="report-box" id="reporteBox">${esc(reporte)}</div></div>`;
},
};

function addSite(e){ e.preventDefault();

  save(); render(); toast('Site agregado'); return false; }

  db.sites=db.sites.filter(s=>s.id!==id); save(); render(); }

  db.cursos.push({id:uid(), fecha:v('c_fecha'), disciplina:v('c_disc'), site:v('c_site'), instructorId:v('c_inst_id'), instructor:v('c_inst'), participantes:+v('c_part')||null});
  save(); render(); toast('Curso registrado'); return false; }

function addInst(e){ e.preventDefault();
  db.instructores.push({id:uid(), nombre:v('i_nombre'), email:v('i_email'), ahaid:v('i_ahaid'), site:v('i_site'), credenciales:[{disciplina:v('i_disc'), vence:v('i_vence'), verificado:false}]});

  db.cuotas.push({id:uid(), site:v('q_site'), concepto:v('q_conc'), fecha:v('q_fecha'), estatus:v('q_est')});

function delCuota(id){ db.cuotas=db.cuotas.filter(q=>q.id!==id); save(); render(); }

  'CAMICC':'CENTRO DE ATENCION MEDICA INTEGRAL', 'CRCJIM':'CRC JIM', 'CCRJIM / CIC HG':'CRC JIM',
  'FACE':'FIRST AID CENTER', 'HNRNP':'HOSPITAL DEL NINO', 'HN VILLA HERMOSA':'HOSPITAL DEL NINO',

};
function normTxt(s){
  if(s==null) return '';
  return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim().toUpperCase();
}
function parseCSV(text){
  const rows=[[]]; let cell='', inQ=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else inQ=false; }
      else cell+=ch;
    }else{
      if(ch==='"') inQ=true;
      else if(ch===','){ rows[rows.length-1].push(cell); cell=''; }
      else if(ch==='\n'){ rows[rows.length-1].push(cell); cell=''; rows.push([]); }
      else if(ch!=='\r') cell+=ch;
    }
  }
  rows[rows.length-1].push(cell);
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}
function parseFechaSheet(s){
  s=String(s||'').trim();
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[0];
  m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
  return '';
}
function buscaSiteId(nombreHoja){
  const n=normTxt(nombreHoja);
  if(!n) return '';
  const aliasKey=Object.keys(SITE_ALIAS).find(k=>normTxt(k)===n);
  const objetivo=aliasKey?normTxt(SITE_ALIAS[aliasKey]):n;
  for(const s of db.sites){ if(normTxt(s.nombre)===objetivo) return s.id; }
  for(const s of db.sites){ const sn=normTxt(s.nombre); if(sn.includes(objetivo)||(objetivo.includes(sn)&&sn.length>3)) return s.id; }
  const p=objetivo.split(' ')[0];
  if(p.length>3) for(const s of db.sites){ if(normTxt(s.nombre).includes(p)) return s.id; }
  return null;
}
function limpiaCelda(x){
  let s=String(x??'').trim();
  if(/^\d+\.0$/.test(s)) s=s.slice(0,-2); // números que llegan como 123.0
  return ['','NONE','NAN','PENDIENTE','NO APLICA','N/A','-'].includes(s.toUpperCase())?'':s;
}
function gvizJSONP(sheetName){
  return new Promise((resolve, reject)=>{
    const cb = 'gvizcb_' + Math.random().toString(36).slice(2);
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}`;
    const script = document.createElement('script');
    let done = false;
    const cleanup = ()=>{ delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); };
    window[cb] = (data)=>{ done=true; cleanup(); resolve(data); };
    script.onerror = ()=>{ if(!done){ cleanup(); reject(new Error('No se pudo cargar la pestaña «'+sheetName+'». ¿Existe y la hoja es pública?')); } };
    setTimeout(()=>{ if(!done){ cleanup(); reject(new Error('Tiempo de espera agotado leyendo «'+sheetName+'».')); } }, 15000);
    script.src = url;
    document.head.appendChild(script);
  });
}
function gvizToRows(data){
  // data es el objeto de gviz: {table:{cols:[...], rows:[{c:[{v:..},...]},...]}}
  if(!data || !data.table) throw new Error('Respuesta de Google Sheets no reconocida.');
  const cols = (data.table.cols||[]).map(c=> (c.label||'').trim() );
  const rows = (data.table.rows||[]).map(r=> (r.c||[]).map(cell=>{
    if(!cell) return '';
    // fechas gviz llegan como "Date(2026,5,1)" en v; usar f (formateado) si existe
    if(cell.f!=null) return String(cell.f);
    if(cell.v==null) return '';
    if(typeof cell.v==='string' && cell.v.startsWith('Date(')){
      const m = cell.v.match(/Date\((\d+),(\d+),(\d+)/);
      if(m) return `${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${String(+m[3]).padStart(2,'0')}`;
    }
    return String(cell.v);
  }));
  // integrarSheets localiza la fila de encabezados real por contenido,
  // así que devolvemos cols (por si son los encabezados) + todas las filas.
  return [cols, ...rows];
}

function integrarSheets(rowsInst, rowsCat){
  const hIdx = rowsInst.findIndex(r=>{const n=r.map(normTxt); return n.some(c=>c.includes('NOMBRE')) && n.some(c=>c.includes('DISCIPLINA'));});
  if(hIdx<0) throw new Error('No encontré la fila de encabezados en INSTRUCTORES.');
  const H = rowsInst[hIdx].map(normTxt);
  const col = (...keys) => H.findIndex(c=>keys.every(k=>c.includes(k)));
  const C = {
    nombre: col('NOMBRE'), correo: (col('CORREO')>=0?col('CORREO'):col('EMAIL')),
    tipo: col('TIPO'), disc: col('DISCIPLINA'), sitio: col('SITIO'),
    resp: col('RESPONSABLE'), vence: (col('VENC','CREDENCIAL')>=0?col('VENC','CREDENCIAL'):col('VENC')),
    ecard: col('ECARD'), ceAnt: col('CE','ANTERIOR'), ce25: col('CE','2025'),
    ahaid: (col('ATLAS')>=0?col('ATLAS'):col('AHA','ID')), tarjeta: col('TARJETA'),
  };
  if(C.ce25>=0 && H[C.ce25].includes('UPDATE')) C.ce25 = H.findIndex(c=>c.includes('CE')&&c.includes('2025')&&!c.includes('UPDATE'));
  if(C.nombre<0||C.disc<0) throw new Error('Faltan columnas Nombre/Disciplina en INSTRUCTORES.');
  const instPorNorm = {};
  const snapEmail = new Map(), snapCred = new Map();
  db.instructores.forEach(i=>{
    const k = normTxt(i.nombre);
    instPorNorm[k]=i;
    snapEmail.set(k, (i.email||'')+'|'+(i.ahaid||''));
    (i.credenciales||[]).forEach(c=>snapCred.set(k+'|'+normTxt(c.disciplina), {vence:c.vence||'', ecard:c.ecard||'', ceAnt:c.ceAnt||'', ce25:c.ce25||'', tarjeta:c.tarjeta||''}));
  });
  const res = {filas:0,instNuevos:0,credNuevas:0,fechasAct:0,correos:0,codigos:0,sitesNuevos:[],catalogo:0};
  const g = (r,ix)=> ix>=0 ? limpiaCelda(r[ix]) : '';
  for(const r of rowsInst.slice(hIdx+1)){
    const nombre = g(r,C.nombre); if(!nombre) continue;
    if(normTxt(nombre).includes('EJEMPLO')) continue;
    res.filas++;
    const key = normTxt(nombre);
    let inst = instPorNorm[key];
    if(!inst){
      let sid = buscaSiteId(g(r,C.sitio));
      if(sid===null){
        sid = uid();
        db.sites.push({id:sid,nombre:g(r,C.sitio),ts:'',ciudad:'',coordinador:''});
        res.sitesNuevos.push(g(r,C.sitio));
      }
      inst = {id:uid(), nombre:nombre, email:'', tipo:g(r,C.tipo)||'Instructor', site:sid||'', credenciales:[]};
      db.instructores.push(inst); instPorNorm[key]=inst;
      res.instNuevos++;
    }
    const correo = g(r,C.correo);
    if(correo) inst.email=correo;
    const tipo = g(r,C.tipo); if(tipo) inst.tipo=tipo;
    const resp = g(r,C.resp); if(resp) inst.responsable=resp;
    const ahaid = g(r,C.ahaid); if(ahaid) inst.ahaid=ahaid;
    const sitioHoja = g(r,C.sitio);
    if(sitioHoja){ const sid=buscaSiteId(sitioHoja); if(sid) inst.site=sid; }
    const disc = normTxt(g(r,C.disc)); if(!disc) continue;
    let cred = (inst.credenciales||[]).find(c=>normTxt(c.disciplina)===disc);
    if(!cred){ cred={disciplina:disc,vence:'',verificado:false}; inst.credenciales.push(cred); res.credNuevas++; }
    const v = parseFechaSheet(g(r,C.vence));
    if(v) cred.vence=v;
    for(const par of [['ecard',C.ecard],['ceAnt',C.ceAnt],['ce25',C.ce25],['tarjeta',C.tarjeta]]){
      const val=g(r,par[1]);
      if(val) cred[par[0]]=val;
    }
  }
  db.instructores.forEach(i=>{
    const k = normTxt(i.nombre);
    if(snapEmail.has(k) && snapEmail.get(k)!==((i.email||'')+'|'+(i.ahaid||''))) res.correos++;
    (i.credenciales||[]).forEach(c=>{
      const s0 = snapCred.get(k+'|'+normTxt(c.disciplina));
      if(!s0) return;
      if(s0.vence!==(c.vence||'')) res.fechasAct++;
      for(const f of ['ecard','ceAnt','ce25','tarjeta']) if(s0[f]!==(c[f]||'')) res.codigos++;
    });
  });
  const cIdx = rowsCat.findIndex(r=>{const n=r.map(normTxt); return n.includes('BLS')&&n.includes('ACLS');});
  if(cIdx>=0){
    const HC = rowsCat[cIdx].map(normTxt);
    const dcols = {}; ['BLS','ACLS','PALS','NRP','ASLS','HEARTSAVER','PEARS'].forEach(d=>{const ix=HC.indexOf(d); if(ix>=0) dcols[d]=ix;});
    const nameIx = HC.findIndex(c=>c.includes('SITIO')||c.includes('NOMBRE')); const nIx=nameIx>=0?nameIx:1;
    const respIx = HC.findIndex(c=>c.includes('RESPONSABLE'));
    const estIx = HC.findIndex(c=>c.includes('ESTATUS')||c.includes('ESTADO'));
    for(const r of rowsCat.slice(cIdx+1)){
      const nombre = limpiaCelda(r[nIx]); if(!nombre) continue;
      const sid = buscaSiteId(nombre); if(!sid) continue;
      const s = db.sites.find(x=>x.id===sid);
      const auth = Object.entries(dcols).filter(e=>String(r[e[1]]||'').includes('✅')).map(e=>e[0]);
      if(auth.length) s.disciplinas=auth;
      if(respIx>=0 && limpiaCelda(r[respIx])) s.responsable=limpiaCelda(r[respIx]);
      if(estIx>=0 && limpiaCelda(r[estIx])) s.estatus=limpiaCelda(r[estIx]);
      res.catalogo++;
    }
  }
  return res;
}

/* ---------- Reporte semestral ---------- */
function verReporteSemestral(){
  const hoy = HOY();
  const semestres = [0,1].map(offset=>{
    const base = new Date(hoy.getFullYear(), hoy.getMonth() - hoy.getMonth()%6 - offset*6, 1);
    const fin = new Date(base.getFullYear(), base.getMonth()+6, 0);
    const label = `${base.toLocaleDateString('es-MX',{month:'long'})} – ${fin.toLocaleDateString('es-MX',{month:'long',year:'numeric'})}`;
    const cursosPeriodo = db.cursos.filter(c=>{ const d=new Date(c.fecha+'T12:00:00'); return d>=base&&d<=fin; });
    const porDisc = {};
    cursosPeriodo.forEach(c=>{ if(!porDisc[c.disciplina]) porDisc[c.disciplina]={cursos:0,part:0}; porDisc[c.disciplina].cursos++; porDisc[c.disciplina].part+=(c.participantes||0); });
    return {label, total:cursosPeriodo.length, participantes:cursosPeriodo.reduce((a,c)=>a+(c.participantes||0),0), porDisc};
  });
  const filasSem = semestres.map(s=>`
    <div class="card" style="flex:1;min-width:260px">
      <h3>${esc(s.label)}</h3>
      <div style="font-size:28px;font-weight:700;color:var(--purple-800)">${s.total} <span style="font-size:14px;font-weight:400;color:var(--ink-soft)">cursos · ${s.participantes} participantes</span></div>
      ${Object.entries(s.porDisc).length?`<table style="margin-top:10px"><thead><tr><th>Disciplina</th><th>Cursos</th><th>Participantes</th></tr></thead><tbody>
        ${Object.entries(s.porDisc).map(([d,v])=>`<tr><td><span class="chip chip-neutral">${d}</span></td><td>${v.cursos}</td><td>${v.participantes}</td></tr>`).join('')}
      </tbody></table>`:'<div class="muted">Sin cursos registrados en este periodo.</div>'}
    </div>`).join('');
  openModal(`<h3>📊 Reporte semestral de cursos</h3>
    <div class="note">Los cursos se registran en el módulo Cursos.</div>
    <div style="display:flex;gap:14px;flex-wrap:wrap">${filasSem}</div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div>`);
}
/* ---------- Lista urgente ---------- */
function copiarListaUrgente(){
  const rows = credenciales().filter(r=>estado(r.cred.vence)==='rojo').sort((a,b)=>diasPara(a.cred.vence)-diasPara(b.cred.vence));
  if(!rows.length){ toast('Sin casos 🔴 que reportar'); return; }
  const hoy = new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'long',year:'numeric'});
  let txt = `LISTA URGENTE DE CREDENCIALES VENCIDAS · ${hoy}
` +
    `Red AHA Training Central · Dr. Eduardo Velasco · Coordinación
` +
    `[BORRADOR — verificar contra AHA Instructor Network antes de enviar]

`;
  const porSite = {};
  rows.forEach(r=>{
    const s = siteName(r.inst.site);
    if(!porSite[s]) porSite[s] = {coordinador: (db.sites.find(x=>x.id===r.inst.site)||{}).coordinador||'', casos:[]};
    porSite[s].casos.push(`  · ${r.inst.nombre}${r.inst.ahaid?' (AHA ID: '+r.inst.ahaid+')':''} — ${r.cred.disciplina} vencida el ${fmtFecha(r.cred.vence)} (${Math.abs(diasPara(r.cred.vence))} días)`);
  });
  Object.entries(porSite).forEach(([site, d])=>{
    txt += `📍 ${site}${d.coordinador?' · Coordinación: '+d.coordinador:''}
`;
    txt += d.casos.join('\n') + '\n\n';
  });
  txt += `Total de casos urgentes: ${rows.length}
`;
  txt += `Todos los casos deben cotejarse contra el AHA Instructor Network antes de comunicarlos.
`;
  navigator.clipboard.writeText(txt).then(()=>toast(`Lista de ${rows.length} casos copiada al portapapeles`));
}

function resetBase(){
  if(!confirm('Esto restablece la base embebida de la red (39 sites, 347 instructores) y descarta los cambios locales no respaldados. ¿Continuar?')) return;
  db = JSON.parse(JSON.stringify(INITIAL_DATA)); save(); render(); toast('Base de la red restablecida');
}
function importJSON(ev){
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const data=JSON.parse(r.result);
      if(!data.sites||!data.instructores) throw 0;
      db=data; save(); render(); toast('Respaldo restaurado');
    }catch(e){ toast('El archivo no es un respaldo válido'); } };
  r.readAsText(f); ev.target.value='';
}
function addManual(e){ e.preventDefault();
  if(!db.manuales) db.manuales=[];
  db.manuales.push({id:uid(), site:v('ml_site'), disciplina:v('ml_disc'), edicion:v('ml_ed'), cantidad:+v('ml_cant'), entregados:0});
  logCambio('manual', siteName(v('ml_site')), 'lote_'+v('ml_disc'), '', '+'+v('ml_cant'));
  save(); render(); toast('Lote registrado'); return false; }
function entregarManual(id){
  const r=(db.manuales||[]).find(x=>x.id===id); if(!r) return;
  const n=prompt('Cantidad a registrar como entregada (stock: '+((r.cantidad||0)-(r.entregados||0))+'):','1');
  if(!n||isNaN(+n)||+n<=0) return;
  r.entregados=(r.entregados||0)+(+n);
  logCambio('manual', siteName(r.site), 'entrega_'+r.disciplina, '', '+'+n);
  save(); render(); toast(n+' manual(es) registrados'); }
function delManual(id){ db.manuales=(db.manuales||[]).filter(x=>x.id!==id); save(); render(); }
function exportLogCSV(){
  const rows=[['Fecha','Tipo','Entidad','Campo','Anterior','Nuevo']];
  (db.log||[]).forEach(e=>rows.push([e.ts,e.tipo,e.entidad,e.campo,e.anterior,e.nuevo]));
  descargar(rows.map(r=>r.map(x=>`"${String(x||'').replace(/"/g,'""')}"`).join(',')).join('\n'),'historial-cambios.csv','text/csv');
}
function descargar(contenido, nombre, tipo){
  const blob=new Blob([contenido],{type:tipo}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=nombre; a.click(); URL.revokeObjectURL(a.href);
}
